name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

permissions: {}

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26"
          cache: false
      - name: govulncheck (report-only)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          set +e
          govulncheck ./...
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning title=govulncheck::Reported vulnerabilities (often transitive Caddy/TLS deps); see log above"
          fi
          exit 0

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          ./scripts/audit-python-deps.sh

  npm-audit:
    name: npm audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: npm audit
        working-directory: docs
        run: |
          npm ci
          set +e
          npm audit --audit-level=high
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning title=npm audit::High-severity docs dev dependency issues (often no upstream fix yet); see log"
          fi
          exit 0

  gosec:
    name: gosec
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26"
          cache: false
      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -conf .gosec.json -exclude-generated -severity medium -quiet \
            -exclude-dir cmd/embed -exclude-dir cmd/embed-app ./...

  bandit:
    name: bandit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Run bandit
        run: |
          pip install bandit
          bandit -r caddysnake.py cmd/cli/caddysnake cmd/cli/caddysnake_cli.py -ll

  semgrep:
    name: semgrep
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
    container:
      image: semgrep/semgrep@sha256:4095860d71cc40d42617b92b0b420711736ada7d67fdb254c5ef4f37dd8fc3ec
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/ci \
            --config p/golang \
            --config p/python \
            --sarif --sarif-output semgrep.sarif \
            --metrics=off
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Gitleaks detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect \
              --source . \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.sha }}" \
              --redact --verbose
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            gitleaks detect --source . --log-opts="--all" --redact --verbose
          else
            gitleaks detect --source . --redact --verbose
          fi

  snyk-code:
    name: snyk-code
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'
    environment: snyk
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Snyk Code test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} # zizmor: ignore[secrets-in-unapproved-environment]
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "SNYK_TOKEN not set; skipping Snyk Code scan."
            exit 0
          fi
          npm install -g snyk
          snyk code test --severity-threshold=medium
