name: Docker

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

permissions: {}

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKER_HUB: docker.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-verify:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/docker-build-push
        with:
          python-version: ${{ matrix.python-version }}
          push-image: "false"
        secrets: inherit

  build-push:
    if: github.event_name == 'push'
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
      id-token: write
    environment: docker-publish
    steps:
      - uses: ./.github/actions/docker-build-push
        with:
          python-version: ${{ matrix.python-version }}
          push-image: "true"
        secrets: inherit
