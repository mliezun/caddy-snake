# PR Docker image build only (no push). Kept separate from docker-publish.yml so we never
# use jobs.environment here — GitHub treats environment as a deployment (noisy PR UI, one
# row per matrix cell when combined with publish jobs on the same workflow file).
name: Docker

on:
  pull_request:
    branches: ["main"]

permissions: {}

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKER_HUB: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      # Required before uses: ./.github/actions/... — the runner must have the repo (and action.yml) on disk.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/docker-build-push
        with:
          python-version: ${{ matrix.python-version }}
          push-image: "false"

  trivy:
    name: Trivy scan
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Build image for scanning
        run: |
          docker build --build-arg PY_VERSION=${{ matrix.python-version }} -t caddy-snake:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: caddy-snake:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@b6a472f63d85b9c78a3ac5e89422239fc15e9b3c # v3.28.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy
