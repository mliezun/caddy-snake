name: Embed App Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: {}

jobs:
  embed-app:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.13-nogil", "3.14", "3.14-nogil"]
        os: [ubuntu-22.04, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26"
          cache: false
      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
      - name: Get setup-python version
        id: py-ver
        run: |
          ver="${{ matrix.python-version }}"
          if [[ "$ver" == *"-nogil" ]]; then
            ver="${ver%-nogil}t"
          fi
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ steps.py-ver.outputs.ver }}
      - name: Choose architecture
        id: arch
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-22.04-arm" ]; then
            echo "arch=aarch64-unknown-linux-gnu" >> "$GITHUB_OUTPUT"
          else
            echo "arch=x86_64_v2-unknown-linux-gnu" >> "$GITHUB_OUTPUT"
          fi
      - name: Ensure app.zip exists
        working-directory: cmd/embed-app
        run: |
          if [ ! -f app.zip ]; then
            cp placeholder/main.py . && zip -q app.zip main.py && rm main.py
          fi
      - name: Build embed-app binary
        working-directory: cmd/embed-app
        run: | # zizmor: ignore[template-injection]
          ./build.sh app.zip ${{ matrix.python-version }} --output embed-test --arch ${{ steps.arch.outputs.arch }}
      - name: Run embed-app and verify
        working-directory: cmd/embed-app
        run: |
          ./embed-test --listen 127.0.0.1:9080 > embed.log 2>&1 &
          timeout 120 bash -c 'while ! grep -qE "finished cleaning storage units|serving initial configuration" embed.log 2>/dev/null; do sleep 1; done'
          for _ in $(seq 1 60); do
            RESPONSE=$(curl -s http://127.0.0.1:9080/ || true)
            if echo "$RESPONSE" | grep -q "Replace this placeholder"; then
              echo "Response: $RESPONSE"
              exit 0
            fi
            sleep 1
          done
          echo "Timeout. Last response: $RESPONSE"
          echo "=== embed.log ==="
          cat embed.log
          exit 1
