name: Python Build Package - Linux

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: [ubuntu-22.04, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Choose architecture
        id: choose-arch
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-22.04-arm" ]; then
            DOCKER_PLATFORM=linux/arm64
          else
            DOCKER_PLATFORM=linux/amd64
          fi
          echo "DOCKER_PLATFORM=${DOCKER_PLATFORM}" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226
      - name: Build Caddy with caddy-snake module
        run: | # zizmor: ignore[template-injection]
          docker build -f builder.Dockerfile --platform ${{ steps.choose-arch.outputs.DOCKER_PLATFORM }} --build-arg PY_VERSION=${{ matrix.python-version }} -t caddy-snake-builder .
          docker run --rm -v $(pwd):/output caddy-snake-builder
      - name: Setup Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build the CLI
        run: |
          mv caddy cmd/cli/caddysnake-cli
          cd cmd/cli/
          python${{ matrix.python-version }} -m pip install maturin
          python${{ matrix.python-version }} -m maturin build --release
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: caddysnake-cli-${{ matrix.python-version }}-${{ matrix.os }}
          path: cmd/cli/target/wheels/*.whl

  publish:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # The pypa/gh-action-pypi-publish action ships only a linux/amd64 image,
    # so the publish job must run on an amd64 runner regardless of where the
    # wheels were built.
    runs-on: ubuntu-22.04
    environment:
      name: pypi-publish
      url: https://pypi.org/p/caddysnake
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: caddysnake-cli-*
          merge-multiple: true
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
          packages-dir: dist
