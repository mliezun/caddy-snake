name: Python Build Package

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish (e.g. v0.5.7). Uses workflow from main; checks out this tag."
        required: true
        type: string

permissions: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-15, macos-15-intel]
        include:
          - os: ubuntu-22.04
            docker_platform: linux/amd64
            use_docker: true
          - os: ubuntu-22.04-arm
            docker_platform: linux/arm64
            use_docker: true
          - os: macos-15
            use_docker: false
          - os: macos-15-intel
            use_docker: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Set package version from tag
        run: | # zizmor: ignore[template-injection]
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "Publishing caddysnake ${VERSION} from ${TAG}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" cmd/cli/pyproject.toml
          rm -f cmd/cli/pyproject.toml.bak
          grep '^version' cmd/cli/pyproject.toml
      - name: Set up Docker Buildx
        if: matrix.use_docker
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226
      - name: Build Caddy with caddy-snake module (Docker)
        if: matrix.use_docker
        run: | # zizmor: ignore[template-injection]
          docker build -f builder.Dockerfile --platform ${{ matrix.docker_platform }} --build-arg PY_VERSION=${{ matrix.python-version }} -t caddy-snake-builder .
          docker run --rm -v $(pwd):/output caddy-snake-builder
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        if: ${{ !matrix.use_docker }}
        with:
          go-version: "1.26"
          cache: false
      - name: Build Caddy with caddy-snake module (native)
        if: ${{ !matrix.use_docker }}
        run: |
          go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
          CGO_ENABLED=0 xcaddy build --with github.com/mliezun/caddy-snake=.
      - name: Install Rust
        if: ${{ !matrix.use_docker }}
        run: rustup toolchain install stable
      - name: Setup Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build the CLI
        run: |
          mv caddy cmd/cli/caddysnake-cli
          cd cmd/cli/
          python${{ matrix.python-version }} -m pip install maturin
          python${{ matrix.python-version }} -m maturin build --release
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: caddysnake-cli-${{ matrix.python-version }}-${{ matrix.os }}
          path: cmd/cli/target/wheels/*.whl

  publish:
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    # The pypa/gh-action-pypi-publish action ships only a linux/amd64 image,
    # so the publish job must run on an amd64 runner regardless of where the
    # wheels were built.
    runs-on: ubuntu-22.04
    environment:
      name: pypi-publish
      url: https://pypi.org/p/caddysnake
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: caddysnake-cli-*
          merge-multiple: true
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
          packages-dir: dist
