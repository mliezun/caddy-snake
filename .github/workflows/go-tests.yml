name: Go Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: {}

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache: false
      - name: Install Xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
      - name: Run module tests
        run: go test -race -v .
      - name: Run tests with coverage (caddytest incl. on-demand HTTPS)
        run: go test -race -coverprofile=coverage.out -tags=caddytest -timeout 180s .
      - name: Update coverage report
        uses: ncruces/go-coverage-report@dfc237255099f2d25066babde51253992175e365 # v0.3.2
        with:
          coverage-file: coverage.out
        continue-on-error: true
      - name: Enforce minimum coverage
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          echo "Go coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 65 ? 0 : 1) }'
      - name: Build the server
        run: CGO_ENABLED=0 xcaddy build --with github.com/mliezun/caddy-snake=.
